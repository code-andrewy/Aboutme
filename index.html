<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sirsnoopy | coder</title>
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/c0e9641a-6ab6-4aae-87ee-11a4ff2da95d.sketchpad%20(1).png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue: #00d2ff;
      --yellow: #ffde59;
      --glass: rgba(10, 15, 25, 0.45); /* High transparency */
      --border: rgba(255, 255, 255, 0.15);
      --text: #ffffff;
      --muted: #e2e2e2;
      /* Brand Colors */
      --github: #24292e;
      --youtube: #FF0000;
      --discord: #5865F2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      padding: clamp(10px, 3vw, 40px);
      background: #050810 url('https://raw.githubusercontent.com/code-andrewy/jumpman64beta/refs/heads/main/charlie-brown-snoopy-stargazing-desktop-wallpaper-preview.jpg') no-repeat center center fixed;
      background-size: cover;
      overflow-x: hidden;
    }

    .container { 
      perspective: 1000px; 
      width: 100%; 
      max-width: 1100px;
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: clamp(20px, 4vw, 40px);
      padding: clamp(25px, 6vw, 60px);
      display: grid;
      grid-template-columns: 1fr;
      gap: 40px;
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4);
      transform-style: preserve-3d;
      transition: transform 0.25s ease-out;
      position: relative;
    }

    /* Hardware Accelerated Light Tracking */
    .card-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(500px circle at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 1;
      border-radius: inherit;
    }

    .profile-section { display: flex; flex-direction: column; align-items: center; gap: 25px; z-index: 2; }

    .pfp-outer {
      width: clamp(150px, 22vw, 250px);
      height: clamp(150px, 22vw, 250px);
      background: var(--yellow);
      border-radius: 50%;
      overflow: hidden;
      border: 6px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .pfp-outer:hover { transform: scale(1.05) rotate(3deg) translateZ(20px); }
    .pfp-img { width: 100%; height: 100%; object-fit: cover; }

    .content-section { z-index: 2; display: flex; flex-direction: column; gap: 24px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

    .greeting { color: var(--blue); text-transform: uppercase; letter-spacing: 4px; font-weight: 800; font-size: 0.8rem; }
    
    .name-logo { 
      max-width: 380px; width: 100%; height: auto; 
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.4));
      transition: 0.3s ease;
    }
    .name-logo:hover { transform: translateZ(30px); filter: brightness(1.1); }

    .typewriter-wrap { font-size: clamp(1.2rem, 3vw, 1.8rem); font-weight: 800; min-height: 1.5em; }

    .bio { color: var(--muted); font-size: 1.1rem; max-width: 550px; line-height: 1.6; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
    }

    .stat-box {
      background: rgba(255, 255, 255, 0.06);
      padding: 20px;
      border-radius: 20px;
      border: 1px solid var(--border);
      display: flex; align-items: center; gap: 15px;
      transition: 0.3s ease;
    }
    .stat-box:hover { background: rgba(255,255,255,0.12); transform: translateY(-5px); border-color: var(--blue); }

    .stat-box i { font-size: 1.5rem; color: var(--blue); }
    .stat-val { font-weight: 800; font-size: 1.1rem; display: block; }
    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; }

    .social-row { display: flex; gap: 15px; justify-content: center; }

    .social-btn {
      width: 55px; height: 55px; border-radius: 15px;
      background: rgba(255,255,255,0.1); border: 1px solid var(--border);
      color: white; font-size: 1.4rem; display: grid; place-items: center;
      transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-decoration: none;
    }

    /* Brand Color States */
    .btn-github:hover { background: var(--github); transform: translateY(-8px) rotate(-5deg); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
    .btn-youtube:hover { background: var(--youtube); transform: translateY(-8px) rotate(5deg); box-shadow: 0 10px 20px rgba(255,0,0,0.3); }
    .btn-discord:hover { background: var(--discord); transform: translateY(-8px) rotate(-5deg); box-shadow: 0 10px 20px rgba(88,101,242,0.3); }

    /* Layout Scaling */
    @media (min-width: 900px) {
      .card { grid-template-columns: 300px 1fr; align-items: center; }
      .profile-section { border-right: 1px solid var(--border); padding-right: 30px; }
      .social-row { justify-content: flex-start; }
    }

    @media (max-width: 600px) {
      .card { margin: 0; border-radius: 25px; backdrop-filter: blur(8px); }
      .container { perspective: none; }
      .name-logo { max-width: 280px; }
    }

    /* TV / Large Screen Refinements */
    @media (min-width: 1800px) {
      .container { max-width: 1400px; }
      .typewriter-wrap { font-size: 2.5rem; }
    }
    
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body>

  <div class="container" id="tilt-container">
    <main class="card" id="tilt-card">
      <div class="card-glow" id="glow"></div>
      
      <div class="profile-section">
        <div class="pfp-outer">
          <img src="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/c0e9641a-6ab6-4aae-87ee-11a4ff2da95d.sketchpad%20(1).png" alt="Sirsnoopy" class="pfp-img" loading="lazy">
        </div>
        <div class="social-row">
          <a href="https://github.com/code-andrewy" target="_blank" class="social-btn btn-github" aria-label="GitHub"><i class="fa-brands fa-github"></i></a>
          <a href="https://www.youtube.com/@SirSnoopsiee" target="_blank" class="social-btn btn-youtube" aria-label="YouTube"><i class="fa-brands fa-youtube"></i></a>
          <a href="https://discord.com/users/1453900770524266516" target="_blank" class="social-btn btn-discord" aria-label="Discord"><i class="fa-brands fa-discord"></i></a>
        </div>
      </div>

      <div class="content-section">
        <div>
          <p class="greeting">Hello 👋  my name is...</p>
          <img src="https://raw.githubusercontent.com/code-andrewy/Images/refs/heads/main/download__7_-removebg-preview.png" alt="Andrew" class="name-logo" loading="lazy">
        </div>

        <div class="typewriter-wrap">
          I have Experience in <span id="typewriter" style="color:var(--blue)"></span><span style="border-left:3px solid var(--blue); margin-left:4px; animation:blink 0.8s infinite"></span>
        </div>

        <p class="bio">A coder who started at age 12. Just a student with a little too much time on my hands; I make and find cool stuff.</p>
        
        <div class="info-grid">
          <div class="stat-box">
            <i class="fa-regular fa-clock"></i>
            <div><span class="stat-val" id="time">--:--</span><span class="stat-label" id="tzone">System</span></div>
          </div>
          <div class="stat-box">
            <i class="fa-solid fa-cloud-sun"></i>
            <div><span class="stat-val" id="temp">--°F</span><span class="stat-label" id="cond">Weather</span></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const card = document.getElementById('tilt-card');
    const container = document.getElementById('tilt-container');

   
    container.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      card.style.setProperty('--x', `${x}px`);
      card.style.setProperty('--y', `${y}px`);
      
      if(window.innerWidth > 768) {
        const rotateX = (y - (rect.height / 2)) / 35;
        const rotateY = ((rect.width / 2) - x) / 35;
        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
      }
    });

    container.addEventListener('mouseleave', () => {
      card.style.transform = `rotateX(0deg) rotateY(0deg)`;
    });

    
    const phrases = ["Coding", "Scratch coding", "Cybersecurity", "Modern UI", "Html/Js/Css"];
    let i = 0, j = 0, isDeleting = false;
    function loop() {
      const target = document.getElementById("typewriter");
      const currentWord = phrases[i];
      target.textContent = isDeleting ? currentWord.substring(0, j--) : currentWord.substring(0, j++);
      
      if (!isDeleting && j > currentWord.length) { isDeleting = true; setTimeout(loop, 2000); }
      else if (isDeleting && j < 0) { isDeleting = false; i = (i + 1) % phrases.length; j = 0; setTimeout(loop, 600); }
      else { setTimeout(loop, isDeleting ? 40 : 110); }
    }
    loop();

    
    function updateTime() {
      const now = new Date();
      document.getElementById('time').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('tzone').textContent = Intl.DateTimeFormat().resolvedOptions().timeZone.split('/').pop().replace('_', ' ');
    }
    setInterval(updateTime, 1000); 
    updateTime();

    async function fetchWeather() {
      try {
        const res = await fetch('https://api.weather.gov/points/43.1939,-71.5724');
        const data = await res.json();
        const forecast = await (await fetch(data.properties.forecastHourly)).json();
        document.getElementById('temp').textContent = `${forecast.properties.periods[0].temperature}°F`;
        document.getElementById('cond').textContent = forecast.properties.periods[0].shortForecast;
      } catch (e) { document.getElementById('cond').textContent = "Offline"; }
    }
    fetchWeather();
  </script>
</body>
</html>
