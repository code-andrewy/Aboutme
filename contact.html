<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact me</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #00d2ff;
            --yellow: #ffd700; 
            --glass: rgba(15, 20, 35, 0.85);
            --border: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
            --muted: #cbd5e1;
            --bg-fallback: url('https://raw.githubusercontent.com/code-andrewy/jumpman64beta/refs/heads/main/charlie-brown-snoopy-stargazing-desktop-wallpaper-preview.jpg');
            --smooth-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), var(--bg-fallback);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px; color: var(--text);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: appear 0.6s var(--smooth-bounce);
        }

        h2 { font-weight: 800; margin-bottom: 8px; letter-spacing: -1px; }
        p { color: var(--muted); font-size: 0.9rem; margin-bottom: 25px; }

        .input-group { text-align: left; margin-bottom: 18px; position: relative; }
        
        label { 
            font-size: 0.65rem; font-weight: 800; color: var(--blue); 
            text-transform: uppercase; letter-spacing: 1.5px; 
            margin-left: 12px; margin-bottom: 6px; display: block;
        }

        input, textarea {
            width: 100%; padding: 14px 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: white; font-family: inherit; transition: 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--blue);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        button {
            width: 100%; padding: 16px;
            background: var(--blue); color: #0f1423;
            border: none; border-radius: 16px;
            font-weight: 800; cursor: pointer;
            transition: 0.4s var(--smooth-bounce);
        }

        button:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        .hidden { display: none; }

        @keyframes appear {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Email me</h2>
    <p>Business hours 3:00 pm to 6:00 pm</p>

    <form id="contactForm" action="https://formsubmit.co/sirsnoopsiee@proton.me" method="POST">
        <input type="text" name="_honey" class="hidden">
        <input type="hidden" name="_captcha" value="true">
        <input type="hidden" name="_template" value="table">
        
        <div class="input-group">
            <label>Name</label>
            <input type="text" name="name" id="name" placeholder="Your name here" required>
        </div>

        <div class="input-group">
            <label>Email</label>
            <input type="email" name="email" id="email" placeholder="Joemama@example.com" required>
        </div>

        <div class="input-group">
            <label>Message</label>
            <textarea name="message" id="message" rows="4" placeholder="Your message here..." required></textarea>
        </div>

        <button type="submit" id="submitBtn">Send it!</button>
    </form>
</div>

<script>
    const form = document.getElementById('contactForm');
    const btn = document.getElementById('submitBtn');

    form.addEventListener('submit', (e) => {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const msg = document.getElementById('message').value.trim();

        // 1. NO BLANK FORMS: Check if fields are just spaces
        if (!name || !email || !msg) {
            e.preventDefault();
            alert("Please fill out all fields.");
            return;
        }

        
        const checkPattern = /<[^>]*>|javascript:/gi;
        if (checkPattern.test(name) || checkPattern.test(msg)) {
            e.preventDefault();
            alert("Naughty Naughty");
            return;
        }

    
        btn.disabled = true;
        btn.innerText = "Sending...";
    });
</script>

</body>
</html>
