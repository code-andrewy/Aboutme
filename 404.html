
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Not Found</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --yellow: #ffde59;
            --glass: rgba(15, 20, 35, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --bg-image: url('https://raw.githubusercontent.com/code-andrewy/jumpman64beta/refs/heads/main/charlie-brown-snoopy-stargazing-desktop-wallpaper-preview.jpg');
        }

        body {
            height: 100vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), var(--bg-image);
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        .container {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 60px 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: var(--yellow);
            line-height: 1;
        }

        p {
            font-size: 1.2rem;
            margin: 20px 0 40px;
            opacity: 0.8;
        }

        .home-link {
            text-decoration: none;
            color: #000;
            background: var(--yellow);
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 800;
            transition: transform 0.2s;
            display: inline-block;
        }

        .home-link:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        
        <a href="https://sirsnoopy.pages.dev/" class="home-link">
            Return Home
        </a>
    </div>

</body>
</html>
