<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumpman64</title>
    
    <script>
        /* 1. ROBUST IFRAME CHECK */
        try {
            if (window.top === window.self) {
                document.documentElement.style.display = 'none';
                window.location.replace("https://sirsnoopy.pages.dev/pleaselaunchinaniframe");
            }
        } catch (e) {
            // If cross-origin prevents checking top, we assume we are in an iframe
            console.log("Iframe check bypassed due to cross-origin policy.");
        }
    </script>

    <style>
        /* INITIAL STYLES */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: #000;
            font-family: sans-serif;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; -ms-overflow-style: none; }

        #loader-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 9999;
            color: white;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <div id="status">Loading latest version...</div>
    </div>

    <script>
        (function() {
            // Ensure we don't run if we're redirecting
            if (window.top === window.self) return;

            const baseUrl = 'https://raw.githubusercontent.com/code-andrewy/jumpman64beta/main/index.html';
            const url = baseUrl + '?v=' + Date.now();

            fetch(url, { cache: "no-store" })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.text();
                })
                .then(html => {
                    // Start writing the new document
                    document.open();
                    document.write(html);
                    
                    // Inject Banner Styles, Banner HTML, and the Redirect Script INTO the new document
                    const bannerLogic = `
                        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                        <style>
                            #jumpman-notice-banner {
                                position: fixed;
                                top: 0; left: 0; width: 100%;
                                background: linear-gradient(90deg, #000000, #333333);
                                color: white;
                                display: flex;
                                justify-content: center;
                                align-items: center;
                                padding: 10px 0;
                                font-family: 'Segoe UI', Roboto, sans-serif;
                                font-size: 14px;
                                z-index: 10001;
                                box-shadow: 0 4px 10px rgba(0,0,0,0.3);
                                transition: all 0.4s ease;
                            }
                            #jumpman-notice-banner i { margin-right: 10px; }
                            .banner-text { text-align: center; font-weight: 600; width: 100%; }
                            .banner-hidden { transform: translateY(-100%); opacity: 0; pointer-events: none; }
                            body.has-banner { padding-top: 40px !important; }
                            ::-webkit-scrollbar { display: none !important; }
                            * { scrollbar-width: none !important; -ms-overflow-style: none !important; }
                        </style>
                        <div id="jumpman-notice-banner">
                            <div class="banner-text">
                                <i class="fas fa-exclamation-triangle"></i>
                                Press "&#96;" for a free cookie 🍪
                            </div>
                        </div>
                        <script>
                            (function() {
                                // 1. Banner visibility logic
                                const banner = document.getElementById('jumpman-notice-banner');
                                function checkVisibility() {
                                    const gameIframe = document.querySelector('iframe');
                                    const isGameActive = !!gameIframe && gameIframe.offsetWidth > 0;
                                    if (isGameActive) {
                                        banner.classList.add('banner-hidden');
                                        document.body.classList.remove('has-banner');
                                    } else {
                                        banner.classList.remove('banner-hidden');
                                        document.body.classList.add('has-banner');
                                    }
                                }
                                setInterval(checkVisibility, 500);

                                // 2. Panic Key Logic (Redirect on Backtick)
                                document.addEventListener('keydown', function(event) {
                                    if (event.key === '\\u0060') { // \\u0060 is the unicode for the backtick \`
                                        window.location.replace('https://classroom.google.com/u/1/');
                                    }
                                });
                            })();
                        <\/script>
                    `;
                    document.write(bannerLogic);
                    document.close();
                })
                .catch(error => {
                    const statusEl = document.getElementById('status');
                    if (statusEl) {
                        statusEl.style.color = '#ff4444';
                        statusEl.innerText = 'Error: ' + error.message;
                    }
                });
        })();
    </script>
</body>

</html>
